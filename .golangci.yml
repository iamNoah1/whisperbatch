run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - misspell
    - unconvert
    - unparam

linters-settings:
  errcheck:
    check-blank: false

issues:
  exclude-rules:
    # Allow fmt.Fprintf to os.Stderr without error check (progress output)
    - linters: [errcheck]
      text: "fmt.Fprintf"
