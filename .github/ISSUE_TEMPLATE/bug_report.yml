name: Bug Report
description: Something isn't working as expected
labels: [bug]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the form below.

  - type: input
    id: version
    attributes:
      label: whisperbatch version
      description: Run `whisperbatch --version`
      placeholder: "v1.0.0"
    validations:
      required: true

  - type: input
    id: whisper-version
    attributes:
      label: Whisper version
      description: Run `whisper --version` or `pip show openai-whisper`
      placeholder: "20231117"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14 / Ubuntu 22.04 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command you ran
      render: shell
      placeholder: "whisperbatch -i ./recordings -f txt -f srt"
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Output / error message
      render: text
